name: Build Windows Local Warp

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        default: ime-stable-20260603-pr10122
      official_stable_tag:
        description: "Official stable tag to use in the local release tag"
        required: true
        type: string
      local_release_suffix:
        description: "Local suffix, for example kakucoco.1"
        required: true
        type: string
      release_notes_path:
        description: "Optional repo-relative release notes markdown file"
        required: false
        type: string
      cache_shared_key:
        description: "Rust cache shared key. Reuse an existing key when running baseline comparisons."
        required: false
        type: string
        default: windows-ime-warp-oss

permissions:
  contents: write

jobs:
  build:
    name: Build Windows WarpOss
    runs-on: windows-2022

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.cache_shared_key }}
          cache-on-failure: true
          cache-workspace-crates: true
          workspaces: |
            . -> target

      - name: Set build metadata
        shell: pwsh
        run: |
          $officialTag = "${{ inputs.official_stable_tag }}".Trim()
          $localSuffix = "${{ inputs.local_release_suffix }}".Trim().TrimStart("-")
          if (-not $officialTag.Contains(".stable_")) {
            throw "official_stable_tag must be an official stable tag containing '.stable_'."
          }
          if ([string]::IsNullOrWhiteSpace($localSuffix)) {
            throw "local_release_suffix is required, for example kakucoco.1."
          }

          $releaseTag = "$officialTag-$localSuffix"
          $targetRef = "${{ inputs.ref }}".Trim()
          $buildCommit = (git rev-parse HEAD).Trim()
          "GIT_RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          "OFFICIAL_STABLE_TAG=$officialTag" >> $env:GITHUB_ENV
          "LOCAL_RELEASE_SUFFIX=$localSuffix" >> $env:GITHUB_ENV
          "RELEASE_NOTES_PATH=${{ inputs.release_notes_path }}" >> $env:GITHUB_ENV
          "TARGET_REF=$targetRef" >> $env:GITHUB_ENV
          "BUILD_COMMIT=$buildCommit" >> $env:GITHUB_ENV

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "31.x"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Install release dependencies
        shell: pwsh
        run: |
          cargo install --locked cargo-about@0.8.4

      - name: Build WarpOss installer
        id: bundle
        shell: pwsh
        run: |
          .\script\windows\bundle.ps1 -CHANNEL oss -ARCH x64 -RELEASE_TAG $env:RELEASE_TAG

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item script\windows\Output\WarpOssSetup.exe dist\WarpOssSetup.exe

          $profileDir = "target\x86_64-pc-windows-msvc\rlto"
          $portableDir = "dist\WarpOssPortable"
          New-Item -ItemType Directory -Force $portableDir | Out-Null
          Copy-Item "$profileDir\warp-oss.exe" $portableDir
          Copy-Item app\channels\oss\icon\no-padding\icon.ico $portableDir
          Copy-Item app\assets\bundled\bootstrap\pwsh.ps1 $portableDir
          Copy-Item app\assets\windows\x64\conpty.dll $portableDir
          Copy-Item app\assets\windows\x64\dxcompiler.dll $portableDir
          Copy-Item app\assets\windows\x64\dxil.dll $portableDir
          Copy-Item app\assets\windows\x64\msvcp140.dll $portableDir
          Copy-Item app\assets\windows\x64\vcruntime140.dll $portableDir
          Copy-Item app\assets\windows\x64\vcruntime140_1.dll $portableDir
          New-Item -ItemType Directory -Force "$portableDir\x64" | Out-Null
          Copy-Item app\assets\windows\x64\OpenConsole.exe "$portableDir\x64"
          Copy-Item "$profileDir\resources" $portableDir -Recurse

          Compress-Archive -Path "$portableDir\*" -DestinationPath dist\WarpOssPortable.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warp-oss-local-windows
          path: |
            dist/WarpOssSetup.exe
            dist/WarpOssPortable.zip
          retention-days: 7

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = "Built from target ref $env:TARGET_REF at commit $env:BUILD_COMMIT with Windows OSS channel. Official stable tag: $env:OFFICIAL_STABLE_TAG. Local suffix: $env:LOCAL_RELEASE_SUFFIX. Use WarpOssSetup.exe for normal install, or extract WarpOssPortable.zip and run warp-oss.exe for a no-installer test."
          $assets = @("dist\WarpOssSetup.exe", "dist\WarpOssPortable.zip")
          $ghArgs = @(
            "release", "create", $env:RELEASE_TAG
          ) + $assets + @(
            "--title", "Warp Windows local build $env:RELEASE_TAG",
            "--target", $env:BUILD_COMMIT,
            "--prerelease"
          )

          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_NOTES_PATH)) {
            if (-not (Test-Path $env:RELEASE_NOTES_PATH)) {
              throw "release_notes_path does not exist: $env:RELEASE_NOTES_PATH"
            }
            $ghArgs += @("--notes-file", $env:RELEASE_NOTES_PATH)
          } else {
            $ghArgs += @("--notes", $notes)
          }

          gh @ghArgs

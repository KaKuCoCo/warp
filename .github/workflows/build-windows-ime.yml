name: Build Windows IME Warp

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows WarpOss
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build metadata
        shell: pwsh
        run: |
          "GIT_RELEASE_TAG=v0.2026.06.03.09.49.stable_00-ime-pr10122.${{ github.run_number }}" >> $env:GITHUB_ENV
          "RELEASE_TAG=v0.2026.06.03.09.49.stable_00-ime-pr10122.${{ github.run_number }}" >> $env:GITHUB_ENV

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "31.x"

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-ime-warp-oss
          cache-on-failure: true
          workspaces: |
            . -> target

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Install release dependencies
        shell: pwsh
        run: |
          cargo install --locked cargo-about@0.8.4

      - name: Build WarpOss installer
        id: bundle
        shell: pwsh
        run: |
          .\script\windows\bundle.ps1 -CHANNEL oss -ARCH x64 -RELEASE_TAG $env:RELEASE_TAG

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item script\windows\Output\WarpOssSetup.exe dist\WarpOssSetup-ime.exe

          $profileDir = "target\x86_64-pc-windows-msvc\rlto"
          $portableDir = "dist\WarpOssPortable"
          New-Item -ItemType Directory -Force $portableDir | Out-Null
          Copy-Item "$profileDir\warp-oss.exe" $portableDir
          Copy-Item app\channels\oss\icon\no-padding\icon.ico $portableDir
          Copy-Item app\assets\bundled\bootstrap\pwsh.ps1 $portableDir
          Copy-Item app\assets\windows\x64\conpty.dll $portableDir
          Copy-Item app\assets\windows\x64\dxcompiler.dll $portableDir
          Copy-Item app\assets\windows\x64\dxil.dll $portableDir
          Copy-Item app\assets\windows\x64\msvcp140.dll $portableDir
          Copy-Item app\assets\windows\x64\vcruntime140.dll $portableDir
          Copy-Item app\assets\windows\x64\vcruntime140_1.dll $portableDir
          New-Item -ItemType Directory -Force "$portableDir\x64" | Out-Null
          Copy-Item app\assets\windows\x64\OpenConsole.exe "$portableDir\x64"
          Copy-Item "$profileDir\resources" $portableDir -Recurse

          Compress-Archive -Path "$portableDir\*" -DestinationPath dist\WarpOssPortable-ime.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warp-oss-ime-windows
          path: |
            dist/WarpOssSetup-ime.exe
            dist/WarpOssPortable-ime.zip
          retention-days: 7

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:RELEASE_TAG dist\WarpOssSetup-ime.exe dist\WarpOssPortable-ime.zip `
            --title "Warp Windows IME build $env:RELEASE_TAG" `
            --notes "Built from public stable tag v0.2026.06.03.09.49.stable_00 with PR #10122 (Enable IME marked text on Windows). This is an unofficial OSS-channel build. Use WarpOssSetup-ime.exe for normal install, or extract WarpOssPortable-ime.zip and run warp-oss.exe for a no-installer test." `
            --prerelease
